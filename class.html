<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จัดการชั้นเรียน — ระบบจัดการนักเรียน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f5f4f0;--surface:#ffffff;--blue:#0f3460;--blue-lt:#e6eef7;--text:#1a1a2e;--muted:#6b7280;--border:rgba(0,0,0,0.08);--radius:12px;--sidebar-w:200px;--topbar-h:56px;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;}
.brand{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:var(--text);text-decoration:none;}
.brand-dot{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.brand-dot svg{width:18px;height:18px;fill:white;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.user-info{font-size:13px;display:flex;align-items:center;gap:8px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
.role-badge{padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;}
.role-admin{background:#fef2f2;color:#b91c1c;}.role-user{background:#f0fdf4;color:#166534;}
.btn-logout{padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:transparent;font-family:'Sarabun',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;}
.btn-logout:hover{background:var(--bg);}
.sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--muted);padding:8px 10px 4px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;color:var(--muted);text-decoration:none;transition:all .15s;}
.nav-item svg{width:17px;height:17px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.nav-item:hover{background:var(--bg);color:var(--text);}
.nav-item.active{background:var(--blue-lt);color:var(--blue);font-weight:500;}
.nav-sep{height:1px;background:var(--border);margin:8px 0;}
.main{margin-left:var(--sidebar-w);margin-top:var(--topbar-h);padding:24px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.page-title{font-size:20px;font-weight:600;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text);transition:all .15s;}
.btn:hover{background:var(--bg);}
.btn:active{transform:scale(.97);}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.btn-primary{background:var(--blue);color:white;border-color:var(--blue);}
.btn-primary:hover{background:#0a2847;}
.btn-danger{background:#fef2f2;color:#b91c1c;border-color:#fecaca;}
.btn-danger:hover{background:#fee2e2;}
.btn-sm{padding:5px 10px;font-size:12px;}

/* Classes grid */
.classes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:28px;}
.class-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all .2s;}
.class-card:hover{border-color:rgba(15,52,96,.2);box-shadow:0 2px 8px rgba(0,0,0,.06);}
.class-card.active-card{border-color:var(--blue);background:var(--blue-lt);}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.cc-name{font-size:16px;font-weight:600;color:var(--text);}
.class-card.active-card .cc-name{color:var(--blue);}
.cc-actions{display:flex;gap:6px;opacity:0;transition:.15s;}
.class-card:hover .cc-actions{opacity:1;}
.cc-teacher{font-size:12px;color:var(--muted);margin-bottom:10px;}
.cc-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:500;}
.chip-green{background:#f0fdf4;color:#166534;}.chip-red{background:#fef2f2;color:#b91c1c;}.chip-blue{background:#eff6ff;color:#1e40af;}

/* Student panel */
.students-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.panel-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:14px;font-weight:600;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border);background:#fafafa;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.avatar-sm{width:28px;height:28px;border-radius:50%;background:var(--blue);color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:16px;padding:24px 28px;width:460px;max-width:95vw;animation:fadeUp .25s ease;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:12px;font-weight:500;}
input[type="text"],input[type="number"],select.modal-sel{width:100%;height:40px;border:1px solid var(--border);border-radius:8px;padding:0 12px;font-family:'Sarabun',sans-serif;font-size:13px;color:var(--text);background:#fafafa;outline:none;}
input:focus,select.modal-sel:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(15,52,96,.08);background:white;}

#toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.success{background:#052e16;color:#86efac;}
#toast.error{background:#450a0a;color:#fca5a5;}
.readonly-notice{background:#fffbeb;border:1px solid #fde68a;color:#92400e;padding:10px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<header class="topbar">
  <a href="dashboard.html" class="brand">
    <div class="brand-dot"><svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg></div>
    ระบบจัดการนักเรียน
  </a>
  <div class="topbar-right">
    <div class="user-info">
      <div class="avatar" id="avatarEl">?</div>
      <span id="userNameEl">ผู้ใช้</span>
      <span class="role-badge" id="roleBadgeEl">—</span>
    </div>
    <button class="btn-logout" onclick="doLogout()">ออกจากระบบ</button>
  </div>
</header>

<nav class="sidebar">
  <div class="sidebar-label">เมนูหลัก</div>
  <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
  <a href="attendance.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>เช็คชื่อ</a>
  <a href="score.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>คะแนน</a>
  <a href="submit.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>ส่งงาน</a>
  <div class="nav-sep"></div>
  <div class="sidebar-label">จัดการ</div>
  <a href="class.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>ชั้นเรียน</a>
  <a href="admin.html" class="nav-item" id="adminNavItem" style="display:none;"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>จัดการผู้ใช้</a>
</nav>

<main class="main">
  <div class="page-header">
    <div class="page-title">จัดการชั้นเรียน</div>
    <button class="btn btn-primary" id="addClassBtn" onclick="openAddClass()" style="display:none;">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      เพิ่มชั้นเรียน
    </button>
  </div>

  <div class="readonly-notice" id="readonlyNotice">
    <strong>โหมดดูอย่างเดียว:</strong> เฉพาะ Admin เท่านั้นที่สามารถแก้ไขข้อมูลได้
  </div>

  <div class="classes-grid" id="classesGrid">
    <div style="color:var(--muted);font-size:13px;grid-column:1/-1;padding:20px 0;">กำลังโหลด...</div>
  </div>

  <div id="studentsSection" style="display:none;">
    <div class="students-panel">
      <div class="panel-header">
        <div class="panel-title" id="studentsPanelTitle">นักเรียน</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm btn-primary" id="addStudentBtn" onclick="openAddStudent()" style="display:none;">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            เพิ่มนักเรียน
          </button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th style="width:48px;">เลขที่</th>
            <th>ชื่อ-สกุล</th>
            <th style="width:100px;" id="adminActionsHeader"></th>
          </tr></thead>
          <tbody id="studentTbody">
            <tr><td colspan="3" style="text-align:center;color:var(--muted);padding:20px;">เลือกชั้นเรียนด้านบน</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Class Modal -->
<div class="modal-overlay" id="classModal">
  <div class="modal">
    <div class="modal-title" id="classModalTitle">เพิ่มชั้นเรียน</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">ชั้น (ม./ป.)</label>
        <select class="modal-sel" id="classLevel">
          <option>ป.1</option><option>ป.2</option><option>ป.3</option><option>ป.4</option><option>ป.5</option><option>ป.6</option>
          <option>ม.1</option><option>ม.2</option><option selected>ม.3</option><option>ม.4</option><option>ม.5</option><option>ม.6</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">ห้อง</label>
        <input type="text" id="classRoom" placeholder="เช่น 1, 2, 3">
      </div>
      <div class="form-group full">
        <label class="form-label">ครูประจำชั้น</label>
        <input type="text" id="classTeacher" placeholder="ชื่อครู">
      </div>
      <div class="form-group">
        <label class="form-label">จำนวนนักเรียน</label>
        <input type="number" id="classCount" placeholder="0" min="0">
      </div>
    </div>
    <input type="hidden" id="editClassId">
    <div class="modal-footer">
      <button class="btn" onclick="closeClassModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveClass()">บันทึก</button>
    </div>
  </div>
</div>

<!-- Student Modal -->
<div class="modal-overlay" id="studentModal">
  <div class="modal">
    <div class="modal-title" id="studentModalTitle">เพิ่มนักเรียน</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">เลขที่</label>
        <input type="number" id="studentNumber" placeholder="1" min="1">
      </div>
      <div class="form-group full">
        <label class="form-label">ชื่อ-สกุล</label>
        <input type="text" id="studentName" placeholder="ชื่อ นามสกุล">
      </div>
    </div>
    <input type="hidden" id="editStudentId">
    <div class="modal-footer">
      <button class="btn" onclick="closeStudentModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveStudent()">บันทึก</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, doc, getDocs, setDoc, deleteDoc, addDoc, query, where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY", authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID", storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID", appId: "YOUR_APP_ID"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let userRole = "", classes = [], currentClassId = "", students = [];

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = "index.html"; return; }
  userRole = sessionStorage.getItem("userRole") || "user";
  const name = sessionStorage.getItem("userName") || user.email;
  document.getElementById("avatarEl").textContent = name.charAt(0).toUpperCase();
  document.getElementById("userNameEl").textContent = name;
  const rb = document.getElementById("roleBadgeEl");
  rb.textContent = userRole === "admin" ? "Admin" : "User";
  rb.className = "role-badge " + (userRole === "admin" ? "role-admin" : "role-user");
  if (userRole === "admin") {
    document.getElementById("adminNavItem").style.display = "flex";
    document.getElementById("addClassBtn").style.display = "inline-flex";
  } else {
    document.getElementById("readonlyNotice").style.display = "block";
  }
  await loadClasses();
});

window.doLogout = async () => { await signOut(auth); sessionStorage.clear(); window.location.href = "index.html"; };

async function loadClasses() {
  const snap = await getDocs(collection(db, "classes"));
  classes = snap.docs.map(d => ({id: d.id, ...d.data()}));
  classes.sort((a,b) => (a.name||"").localeCompare(b.name||"", "th"));
  renderClasses();
}

function renderClasses() {
  const grid = document.getElementById("classesGrid");
  if (!classes.length) {
    grid.innerHTML = `<div style="color:var(--muted);font-size:13px;grid-column:1/-1;padding:20px 0;">ยังไม่มีชั้นเรียน${userRole==="admin"?" กดปุ่มเพิ่มชั้นเรียนเพื่อเริ่มต้น":""}</div>`;
    return;
  }
  const isAdmin = userRole === "admin";
  grid.innerHTML = classes.map(c => `
    <div class="class-card ${c.id === currentClassId ? 'active-card':''}" onclick="selectClass('${c.id}')">
      <div class="cc-top">
        <div class="cc-name">${c.name||"—"}</div>
        ${isAdmin ? `<div class="cc-actions">
          <button class="btn btn-sm" onclick="event.stopPropagation();openEditClass('${c.id}')">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteClass('${c.id}')">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>` : ''}
      </div>
      <div class="cc-teacher">ครูประจำชั้น: ${c.teacher||"—"}</div>
      <div class="cc-chips">
        <span class="chip chip-blue">นักเรียน ${c.studentCount||0} คน</span>
      </div>
    </div>`).join("");
}

window.selectClass = async function(id) {
  currentClassId = id;
  renderClasses();
  const cls = classes.find(c => c.id === id);
  document.getElementById("studentsSection").style.display = "block";
  document.getElementById("studentsPanelTitle").textContent = `นักเรียน ${cls?.name||""}`;
  if (userRole === "admin") {
    document.getElementById("addStudentBtn").style.display = "inline-flex";
    document.getElementById("adminActionsHeader").textContent = "จัดการ";
  }
  await loadStudents(id);
};

async function loadStudents(classId) {
  const tbody = document.getElementById("studentTbody");
  tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:16px;">กำลังโหลด...</td></tr>`;
  const snap = await getDocs(query(collection(db,"students"), where("classId","==",classId)));
  students = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.number||0)-(b.number||0));
  renderStudents();
}

function renderStudents() {
  const isAdmin = userRole === "admin";
  const tbody = document.getElementById("studentTbody");
  if (!students.length) {
    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:20px;">ยังไม่มีนักเรียนในชั้นนี้</td></tr>`;
    return;
  }
  tbody.innerHTML = students.map(s => `<tr>
    <td style="color:var(--muted);">${s.number||"—"}</td>
    <td>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="avatar-sm">${(s.name||"?").charAt(0)}</div>
        ${s.name||"—"}
      </div>
    </td>
    <td>
      ${isAdmin ? `<div style="display:flex;gap:6px;">
        <button class="btn btn-sm" onclick="openEditStudent('${s.id}')">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn btn-sm btn-danger" onclick="deleteStudent('${s.id}')">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </button>
      </div>` : ''}
    </td>
  </tr>`).join("");
}

// CLASS CRUD
window.openAddClass = function() {
  document.getElementById("classModalTitle").textContent = "เพิ่มชั้นเรียน";
  document.getElementById("classRoom").value = "";
  document.getElementById("classTeacher").value = "";
  document.getElementById("classCount").value = "";
  document.getElementById("editClassId").value = "";
  document.getElementById("classModal").classList.add("open");
};

window.openEditClass = function(id) {
  const c = classes.find(x => x.id === id);
  if (!c) return;
  document.getElementById("classModalTitle").textContent = "แก้ไขชั้นเรียน";
  // Parse level/room from name
  const parts = (c.name||"").split("/");
  if (parts.length >= 2) {
    const lvlEl = document.getElementById("classLevel");
    [...lvlEl.options].forEach(o => { if (o.value === parts[0]) o.selected = true; });
    document.getElementById("classRoom").value = parts[1];
  }
  document.getElementById("classTeacher").value = c.teacher||"";
  document.getElementById("classCount").value = c.studentCount||"";
  document.getElementById("editClassId").value = id;
  document.getElementById("classModal").classList.add("open");
};

window.closeClassModal = function() { document.getElementById("classModal").classList.remove("open"); };

window.saveClass = async function() {
  const level   = document.getElementById("classLevel").value;
  const room    = document.getElementById("classRoom").value.trim();
  const teacher = document.getElementById("classTeacher").value.trim();
  const count   = parseInt(document.getElementById("classCount").value) || 0;
  const editId  = document.getElementById("editClassId").value;
  if (!room) { showToast("กรุณากรอกเลขห้อง","error"); return; }
  const name = `${level}/${room}`;
  try {
    if (editId) {
      await setDoc(doc(db,"classes",editId), {name, teacher, studentCount:count},{merge:true});
    } else {
      await addDoc(collection(db,"classes"), {name, teacher, studentCount:count, createdAt:new Date().toISOString()});
    }
    closeClassModal();
    showToast("บันทึกชั้นเรียนเรียบร้อย ✓","success");
    await loadClasses();
  } catch(e) { showToast("เกิดข้อผิดพลาด: "+e.message,"error"); }
};

window.deleteClass = async function(id) {
  if (!confirm("ยืนยันลบชั้นเรียนนี้? ข้อมูลนักเรียนทั้งหมดในชั้นนี้จะถูกลบด้วย")) return;
  try {
    await deleteDoc(doc(db,"classes",id));
    const sSnap = await getDocs(query(collection(db,"students"), where("classId","==",id)));
    await Promise.all(sSnap.docs.map(d => deleteDoc(d.ref)));
    showToast("ลบชั้นเรียนเรียบร้อย","success");
    if (currentClassId === id) {
      currentClassId = "";
      document.getElementById("studentsSection").style.display = "none";
    }
    await loadClasses();
  } catch(e) { showToast("เกิดข้อผิดพลาด: "+e.message,"error"); }
};

// STUDENT CRUD
window.openAddStudent = function() {
  document.getElementById("studentModalTitle").textContent = "เพิ่มนักเรียน";
  document.getElementById("studentNumber").value = students.length + 1;
  document.getElementById("studentName").value = "";
  document.getElementById("editStudentId").value = "";
  document.getElementById("studentModal").classList.add("open");
};

window.openEditStudent = function(id) {
  const s = students.find(x => x.id === id);
  if (!s) return;
  document.getElementById("studentModalTitle").textContent = "แก้ไขข้อมูลนักเรียน";
  document.getElementById("studentNumber").value = s.number||"";
  document.getElementById("studentName").value = s.name||"";
  document.getElementById("editStudentId").value = id;
  document.getElementById("studentModal").classList.add("open");
};

window.closeStudentModal = function() { document.getElementById("studentModal").classList.remove("open"); };

window.saveStudent = async function() {
  const number = parseInt(document.getElementById("studentNumber").value) || 0;
  const name   = document.getElementById("studentName").value.trim();
  const editId = document.getElementById("editStudentId").value;
  if (!name) { showToast("กรุณากรอกชื่อนักเรียน","error"); return; }
  const cls = classes.find(c => c.id === currentClassId);
  try {
    if (editId) {
      await setDoc(doc(db,"students",editId), {number, name},{merge:true});
    } else {
      await addDoc(collection(db,"students"), {
        number, name, classId:currentClassId,
        className: cls?.name||"", createdAt:new Date().toISOString()
      });
      // update class student count
      await setDoc(doc(db,"classes",currentClassId), {studentCount:(cls?.studentCount||0)+1},{merge:true});
    }
    closeStudentModal();
    showToast("บันทึกนักเรียนเรียบร้อย ✓","success");
    await loadStudents(currentClassId);
  } catch(e) { showToast("เกิดข้อผิดพลาด: "+e.message,"error"); }
};

window.deleteStudent = async function(id) {
  if (!confirm("ยืนยันลบนักเรียนคนนี้?")) return;
  try {
    await deleteDoc(doc(db,"students",id));
    const cls = classes.find(c => c.id === currentClassId);
    if (cls) await setDoc(doc(db,"classes",currentClassId), {studentCount:Math.max(0,(cls.studentCount||1)-1)},{merge:true});
    showToast("ลบนักเรียนเรียบร้อย","success");
    await loadStudents(currentClassId);
  } catch(e) { showToast("เกิดข้อผิดพลาด: "+e.message,"error"); }
};

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "show " + type;
  setTimeout(() => { t.className = ""; }, 3000);
}
</script>
